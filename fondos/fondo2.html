<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burbujas Flotantes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            overflow: hidden;
            background: linear-gradient(180deg, #e0f7fa 0%, #f3e5f5 50%, #fce4ec 100%);
            position: relative;
        }

        .bubbles-container {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            bottom: -100px;
            border-radius: 50%;
            opacity: 0.6;
            animation: float-up linear infinite;
        }

        /* Burbujas grandes */
        .bubble-xl {
            width: 80px; height: 80px;
            background: radial-gradient(circle at 30% 30%, 
                rgba(255,255,255,0.9) 0%, 
                rgba(255,182,193,0.4) 40%,
                rgba(255,255,255,0.1) 100%);
            box-shadow: 
                inset -10px -10px 20px rgba(255,255,255,0.5),
                inset 10px 10px 20px rgba(255,182,193,0.2),
                0 8px 20px rgba(255,182,193,0.15);
        }

        /* Burbujas medianas */
        .bubble-lg {
            width: 50px; height: 50px;
            background: radial-gradient(circle at 30% 30%, 
                rgba(255,255,255,0.9) 0%, 
                rgba(176,224,230,0.4) 40%,
                rgba(255,255,255,0.1) 100%);
            box-shadow: 
                inset -8px -8px 16px rgba(255,255,255,0.5),
                inset 8px 8px 16px rgba(176,224,230,0.2),
                0 6px 15px rgba(176,224,230,0.15);
        }

        /* Burbujas pequeñas */
        .bubble-md {
            width: 30px; height: 30px;
            background: radial-gradient(circle at 30% 30%, 
                rgba(255,255,255,0.9) 0%, 
                rgba(221,160,221,0.4) 40%,
                rgba(255,255,255,0.1) 100%);
            box-shadow: 
                inset -5px -5px 10px rgba(255,255,255,0.5),
                inset 5px 5px 10px rgba(221,160,221,0.2),
                0 4px 10px rgba(221,160,221,0.15);
        }

        /* Burbujas tiny */
        .bubble-sm {
            width: 15px; height: 15px;
            background: radial-gradient(circle at 30% 30%, 
                rgba(255,255,255,0.9) 0%, 
                rgba(152,251,152,0.3) 50%,
                rgba(255,255,255,0.1) 100%);
            box-shadow: 
                inset -3px -3px 6px rgba(255,255,255,0.5),
                0 2px 5px rgba(152,251,152,0.1);
        }

        @keyframes float-up {
            0% {
                transform: translateY(0) translateX(0) scale(1);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            25% {
                transform: translateY(-25vh) translateX(20px) scale(1.05);
            }
            50% {
                transform: translateY(-50vh) translateX(-15px) scale(0.95);
            }
            75% {
                transform: translateY(-75vh) translateX(25px) scale(1.02);
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-120vh) translateX(-10px) scale(1);
                opacity: 0;
            }
        }

        /* Reflejo de luz en las burbujas */
        .bubble::after {
            content: '';
            position: absolute;
            top: 15%;
            left: 20%;
            width: 25%;
            height: 25%;
            border-radius: 50%;
            background: rgba(255,255,255,0.8);
            filter: blur(1px);
        }

        /* Contenido demo */
        .content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .content h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 700;
            color: #4a5568;
            letter-spacing: -2px;
            margin-bottom: 16px;
        }

        .content p {
            font-size: 1.1rem;
            color: #718096;
            max-width: 500px;
            font-weight: 300;
        }
    </style>
</head>
<body>
    <div class="bubbles-container" id="bubbles"></div>

    <div class="content">
        <h1>Burbujas Flotantes</h1>
        <p>Burbujas de cristal que flotan con velocidades y tamaños variados. Efecto orgánico puro CSS.</p>
    </div>

    <script>
        const container = document.getElementById('bubbles');
        const sizes = ['bubble-xl', 'bubble-lg', 'bubble-md', 'bubble-sm'];
        const count = 25;

        for (let i = 0; i < count; i++) {
            const bubble = document.createElement('div');
            const sizeClass = sizes[Math.floor(Math.random() * sizes.length)];
            
            bubble.className = `bubble ${sizeClass}`;
            bubble.style.left = `${Math.random() * 100}%`;
            bubble.style.animationDuration = `${Math.random() * 10 + 8}s`;
            bubble.style.animationDelay = `${Math.random() * 15}s`;
            
            container.appendChild(bubble);
        }
    </script>
</body>
</html>
