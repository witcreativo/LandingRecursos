<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Boreal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            overflow: hidden;
            background: #0f0f23;
            position: relative;
        }

        .aurora {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .aurora-layer {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: aurora-move 20s ease-in-out infinite;
        }

        .aurora-1 {
            background: linear-gradient(135deg, 
                rgba(255, 182, 193, 0.4) 0%, 
                rgba(221, 160, 221, 0.3) 30%,
                rgba(176, 224, 230, 0.2) 60%,
                transparent 100%);
            animation-delay: 0s;
            animation-duration: 25s;
        }

        .aurora-2 {
            background: linear-gradient(225deg, 
                rgba(152, 251, 152, 0.3) 0%, 
                rgba(175, 238, 238, 0.3) 40%,
                rgba(255, 218, 185, 0.2) 70%,
                transparent 100%);
            animation-delay: -5s;
            animation-duration: 30s;
        }

        .aurora-3 {
            background: linear-gradient(45deg, 
                rgba(230, 230, 250, 0.3) 0%, 
                rgba(255, 240, 245, 0.3) 35%,
                rgba(240, 248, 255, 0.2) 65%,
                transparent 100%);
            animation-delay: -10s;
            animation-duration: 22s;
        }

        .aurora-4 {
            background: linear-gradient(315deg, 
                rgba(255, 228, 225, 0.25) 0%, 
                rgba(230, 230, 250, 0.25) 50%,
                transparent 100%);
            animation-delay: -15s;
            animation-duration: 28s;
        }

        @keyframes aurora-move {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(1);
            }
            25% {
                transform: translate(5%, -3%) rotate(5deg) scale(1.1);
            }
            50% {
                transform: translate(-3%, 5%) rotate(-3deg) scale(0.95);
            }
            75% {
                transform: translate(3%, 3%) rotate(2deg) scale(1.05);
            }
            100% {
                transform: translate(0, 0) rotate(0deg) scale(1);
            }
        }

        /* Estrellas sutiles */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.8), transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 90px 40px, rgba(255,255,255,0.9), transparent),
                radial-gradient(2px 2px at 160px 120px, rgba(255,255,255,0.7), transparent),
                radial-gradient(1px 1px at 230px 80px, rgba(255,255,255,0.8), transparent),
                radial-gradient(2px 2px at 300px 50px, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 350px 150px, rgba(255,255,255,0.7), transparent),
                radial-gradient(2px 2px at 450px 90px, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 500px 200px, rgba(255,255,255,0.8), transparent),
                radial-gradient(2px 2px at 600px 60px, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 700px 130px, rgba(255,255,255,0.7), transparent),
                radial-gradient(2px 2px at 800px 40px, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 900px 170px, rgba(255,255,255,0.8), transparent),
                radial-gradient(2px 2px at 1000px 80px, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 1100px 140px, rgba(255,255,255,0.7), transparent),
                radial-gradient(2px 2px at 1200px 50px, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 1300px 190px, rgba(255,255,255,0.8), transparent),
                radial-gradient(2px 2px at 1400px 100px, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 1500px 160px, rgba(255,255,255,0.7), transparent),
                radial-gradient(2px 2px at 50px 250px, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 150px 300px, rgba(255,255,255,0.8), transparent),
                radial-gradient(2px 2px at 280px 220px, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 400px 280px, rgba(255,255,255,0.7), transparent),
                radial-gradient(2px 2px at 550px 320px, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 680px 260px, rgba(255,255,255,0.8), transparent),
                radial-gradient(2px 2px at 750px 340px, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 850px 240px, rgba(255,255,255,0.7), transparent),
                radial-gradient(2px 2px at 950px 310px, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 1050px 270px, rgba(255,255,255,0.8), transparent),
                radial-gradient(2px 2px at 1150px 330px, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 1250px 250px, rgba(255,255,255,0.7), transparent),
                radial-gradient(2px 2px at 1350px 290px, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 1450px 350px, rgba(255,255,255,0.8), transparent);
            background-size: 1500px 400px;
            animation: twinkle 4s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.3; }
            100% { opacity: 0.8; }
        }

        /* Contenido demo */
        .content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .content h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 700;
            color: rgba(255,255,255,0.95);
            letter-spacing: -2px;
            margin-bottom: 16px;
            text-shadow: 0 4px 30px rgba(0,0,0,0.3);
        }

        .content p {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.7);
            max-width: 500px;
            font-weight: 300;
        }
    </style>
</head>
<body>
    <div class="aurora">
        <div class="aurora-layer aurora-1"></div>
        <div class="aurora-layer aurora-2"></div>
        <div class="aurora-layer aurora-3"></div>
        <div class="aurora-layer aurora-4"></div>
    </div>
    <div class="stars"></div>

    <div class="content">
        <h1>Aurora Boreal</h1>
        <p>Fondo con degradados fluidos que simulan la aurora boreal en movimiento continuo.</p>
    </div>
</body>
</html>
