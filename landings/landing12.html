<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Wit Creativo - Particle System Ultra HD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            background: #000000;
            color: #ffffff;
        }

        .banner-container {
            display: grid;
            grid-template-columns: 40% 60%;
            min-height: 600px;
            max-width: 1400px;
            margin: 0 auto;
            background: #050505;
            border: 3px solid #222222;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        @media (max-width: 768px) {
            .banner-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto 500px;
            }
        }

        .left-panel {
            display: grid;
            grid-template-rows: auto auto 1fr auto;
            border-right: 3px solid #222222;
            background: linear-gradient(135deg, #0a0a0a 0%, #000000 100%);
        }

        @media (max-width: 768px) {
            .left-panel {
                border-right: none;
                border-bottom: 3px solid #222222;
            }
        }

        .grid-cell {
            padding: 2rem;
            border-bottom: 2px solid #222222;
        }

        .grid-cell:last-child {
            border-bottom: none;
        }

        .logo-cell {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff, #ffd700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .tagline {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.7;
            color: #ffd700;
        }

        .headline-cell h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 700;
            line-height: 0.95;
            text-transform: uppercase;
            letter-spacing: -0.03em;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ffffff, #ffd700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .headline-cell p {
            font-size: 1rem;
            line-height: 1.5;
            opacity: 0.85;
            max-width: 90%;
            color: #cccccc;
            font-weight: 300;
        }

        .stats-cell {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            align-content: end;
        }

        .stat-item {
            border-top: 2px solid #ffd700;
            padding-top: 1rem;
            transition: all 0.3s ease;
        }

        .stat-item:hover {
            border-top-color: #ffffff;
            transform: translateY(-2px);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            display: block;
            margin-bottom: 0.25rem;
            color: #ffd700;
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.7;
            color: #ffffff;
        }

        .cta-cell {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .cta-button {
            background: #ffd700;
            color: #000000;
            padding: 1rem 2rem;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Space Grotesk', sans-serif;
            border-radius: 4px;
        }

        .cta-button:hover {
            background: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255,215,0,0.2);
        }

        .secondary-link {
            font-size: 0.875rem;
            text-decoration: underline;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s;
            color: #ffd700;
        }

        .secondary-link:hover {
            opacity: 1;
            color: #ffffff;
        }

        #three-container {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 600px;
            overflow: hidden;
            cursor: crosshair;
            background: #000000;
        }

        .interaction-hint {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,215,0,0.5);
            color: #ffd700;
            white-space: nowrap;
            font-weight: 500;
            z-index: 10;
        }

        .interaction-hint.visible {
            opacity: 1;
        }

        .shape-indicator {
            position: absolute;
            top: 2rem;
            right: 2rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            opacity: 0.8;
            color: #ffd700;
            background: rgba(0,0,0,0.5);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            backdrop-filter: blur(4px);
            z-index: 10;
            font-weight: 500;
            pointer-events: none;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>
    <div class="banner-container">
        <div class="left-panel">
            <div class="grid-cell logo-cell">
                <span class="logo">Wit Creativo</span>
                <span class="tagline">Agencia Digital</span>
            </div>

            <div class="grid-cell headline-cell">
                <h1>Pixel<br>Perfect</h1>
                <p>Cada partícula cuenta. Transformamos ideas en experiencias digitales memorables, frame por frame.</p>
            </div>

            <div class="grid-cell stats-cell">
                <div class="stat-item">
                    <span class="stat-number">60fps</span>
                    <span class="stat-label">Animaciones</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number">4K</span>
                    <span class="stat-label">Ready</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number">0.1s</span>
                    <span class="stat-label">Load Time</span>
                </div>
            </div>

            <div class="grid-cell cta-cell">
                <button class="cta-button">Experiencia Inmersiva</button>
                <span class="secondary-link">Ver Reel →</span>
            </div>
        </div>

        <div id="three-container">
            <div class="shape-indicator" id="shape-indicator">✦ ESFERA DORADA ✦</div>
            <div class="interaction-hint" id="hint">🎯 Mueve el cursor · Click para EXPLOTAR · Scroll para CAMBIAR FORMA</div>
        </div>
    </div>

    <script>
        // THREE.JS - SISTEMA DE PARTÍCULAS DE ALTO IMPACTO VISUAL
        const container = document.getElementById('three-container');
        const hint = document.getElementById('hint');
        const shapeIndicator = document.getElementById('shape-indicator');

        // Configuración de escena mejorada para máximo brillo
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.FogExp2(0x000000, 0.008);

        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 0, 22);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x000000, 1);
        container.appendChild(renderer.domElement);

        // AUMENTAMOS LA CANTIDAD DE PARTÍCULAS PARA MAYOR IMPACTO
        const particleCount = 6500;
        const baseParticleSize = 0.28;
        
        // Colores vibrantes: oro, blanco intenso, ámbar
        const colorGold = new THREE.Color(0xffaa00);
        const colorBrightGold = new THREE.Color(0xffdd77);
        const colorWhite = new THREE.Color(0xffffff);
        const colorAmber = new THREE.Color(0xff6600);

        // Geometría de partículas
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const originalPositions = new Float32Array(particleCount * 3);
        const velocities = new Float32Array(particleCount * 3);
        const colorsArray = new Float32Array(particleCount * 3);
        const sizes = new Float32Array(particleCount);

        // Definición de formas geométricas más elaboradas
        const shapes = [
            { name: '✨ ESFERA DORADA', generator: generateSphere },
            { name: '🔲 CUBO CÓSMICO', generator: generateCube },
            { name: '🌀 TORUS INFINITO', generator: generateTorus },
            { name: '▲ CONO LUMINOSO', generator: generateCone },
            { name: '⭐ ESTRELLA FÚLGIDA', generator: generateStar },
            { name: 'W WIT CREATIVO', generator: generateLogo }
        ];
        
        let currentShapeIndex = 0;
        let isExploded = false;
        let morphingInProgress = false;

        // Generadores de formas mejorados
        function generateSphere(count, posArr, origArr) {
            const radius = 6.8;
            for (let i = 0; i < count; i++) {
                // Distribución uniforme en esfera
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const x = radius * Math.sin(phi) * Math.cos(theta);
                const y = radius * Math.sin(phi) * Math.sin(theta);
                const z = radius * Math.cos(phi);
                const idx = i * 3;
                posArr[idx] = x;
                posArr[idx+1] = y;
                posArr[idx+2] = z;
                if(origArr) {
                    origArr[idx] = x;
                    origArr[idx+1] = y;
                    origArr[idx+2] = z;
                }
            }
        }

        function generateCube(count, posArr, origArr) {
            const size = 9;
            const edgeParticles = Math.ceil(Math.pow(count, 1/3));
            let idx = 0;
            for (let i = 0; i < edgeParticles && idx < count; i++) {
                for (let j = 0; j < edgeParticles && idx < count; j++) {
                    for (let k = 0; k < edgeParticles && idx < count; k++) {
                        const x = (i / (edgeParticles-1) - 0.5) * size;
                        const y = (j / (edgeParticles-1) - 0.5) * size;
                        const z = (k / (edgeParticles-1) - 0.5) * size;
                        const idxPos = idx * 3;
                        posArr[idxPos] = x;
                        posArr[idxPos+1] = y;
                        posArr[idxPos+2] = z;
                        if(origArr) {
                            origArr[idxPos] = x;
                            origArr[idxPos+1] = y;
                            origArr[idxPos+2] = z;
                        }
                        idx++;
                    }
                }
            }
            // Rellenar el resto con ruido alrededor del cubo
            while(idx < count) {
                const x = (Math.random() - 0.5) * size;
                const y = (Math.random() - 0.5) * size;
                const z = (Math.random() - 0.5) * size;
                const idxPos = idx * 3;
                posArr[idxPos] = x;
                posArr[idxPos+1] = y;
                posArr[idxPos+2] = z;
                if(origArr) {
                    origArr[idxPos] = x;
                    origArr[idxPos+1] = y;
                    origArr[idxPos+2] = z;
                }
                idx++;
            }
        }

        function generateTorus(count, posArr, origArr) {
            const radius = 5.5;
            const tube = 1.8;
            for (let i = 0; i < count; i++) {
                const u = (i / count) * Math.PI * 2;
                const v = Math.random() * Math.PI * 2;
                const x = (radius + tube * Math.cos(v)) * Math.cos(u);
                const y = (radius + tube * Math.cos(v)) * Math.sin(u);
                const z = tube * Math.sin(v) * 1.2;
                const idx = i * 3;
                posArr[idx] = x;
                posArr[idx+1] = y;
                posArr[idx+2] = z;
                if(origArr) {
                    origArr[idx] = x;
                    origArr[idx+1] = y;
                    origArr[idx+2] = z;
                }
            }
        }

        function generateCone(count, posArr, origArr) {
            const height = 10;
            const radius = 5.2;
            for (let i = 0; i < count; i++) {
                const t = Math.random();
                const h = t * height - height/2;
                const r = radius * (1 - (h + height/2)/height);
                const angle = Math.random() * Math.PI * 2;
                const x = r * Math.cos(angle);
                const z = r * Math.sin(angle);
                const y = h;
                const idx = i * 3;
                posArr[idx] = x;
                posArr[idx+1] = y;
                posArr[idx+2] = z;
                if(origArr) {
                    origArr[idx] = x;
                    origArr[idx+1] = y;
                    origArr[idx+2] = z;
                }
            }
        }

        function generateStar(count, posArr, origArr) {
            const outerR = 7.2;
            const innerR = 2.8;
            const spikes = 5;
            for (let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2;
                const spikeAngle = (angle * spikes) % (Math.PI * 2);
                const r = spikeAngle < Math.PI ? outerR : innerR;
                const x = r * Math.cos(angle);
                const y = r * Math.sin(angle);
                const z = (Math.random() - 0.5) * 2.5;
                const idx = i * 3;
                posArr[idx] = x;
                posArr[idx+1] = y;
                posArr[idx+2] = z;
                if(origArr) {
                    origArr[idx] = x;
                    origArr[idx+1] = y;
                    origArr[idx+2] = z;
                }
            }
        }

        function generateLogo(count, posArr, origArr) {
            // "W" estilizado y más grueso para que se note mejor
            for (let i = 0; i < count; i++) {
                const t = i / count;
                let x, y, z;
                // Trazo grueso tipo "W"
                if (t < 0.2) {
                    const localT = t / 0.2;
                    x = -5 + localT * 2.5;
                    y = 3.5 - localT * 7;
                    z = 0;
                } else if (t < 0.4) {
                    const localT = (t - 0.2) / 0.2;
                    x = -2.5 + localT * 2.5;
                    y = -3.5 + localT * 5;
                    z = 0;
                } else if (t < 0.6) {
                    const localT = (t - 0.4) / 0.2;
                    x = 0 + localT * 2.5;
                    y = 1.5 - localT * 7;
                    z = 0;
                } else if (t < 0.8) {
                    const localT = (t - 0.6) / 0.2;
                    x = 2.5 + localT * 2.5;
                    y = -5.5 + localT * 7;
                    z = 0;
                } else {
                    const localT = (t - 0.8) / 0.2;
                    x = 5 - localT * 2.5;
                    y = 1.5 - localT * 6;
                    z = 0;
                }
                // Grosor y volumen
                x += (Math.random() - 0.5) * 1.2;
                y += (Math.random() - 0.5) * 1.2;
                z += (Math.random() - 0.5) * 2.2;
                const idx = i * 3;
                posArr[idx] = x;
                posArr[idx+1] = y;
                posArr[idx+2] = z;
                if(origArr) {
                    origArr[idx] = x;
                    origArr[idx+1] = y;
                    origArr[idx+2] = z;
                }
            }
        }

        // Inicializar con esfera
        generateSphere(particleCount, positions, originalPositions);

        // Asignar colores vibrantes y tamaños variables
        for (let i = 0; i < particleCount; i++) {
            velocities[i*3] = 0;
            velocities[i*3+1] = 0;
            velocities[i*3+2] = 0;
            
            // Colores degradado entre dorado, blanco y ámbar (más vivos)
            const mixRand = Math.random();
            let baseColor;
            if (mixRand < 0.6) baseColor = colorGold;
            else if (mixRand < 0.85) baseColor = colorBrightGold;
            else baseColor = colorAmber;
            
            const finalColor = baseColor.clone().lerp(colorWhite, Math.random() * 0.5);
            colorsArray[i*3] = finalColor.r;
            colorsArray[i*3+1] = finalColor.g;
            colorsArray[i*3+2] = finalColor.b;
            
            // Tamaños más grandes y variados
            sizes[i] = baseParticleSize * (0.7 + Math.random() * 1.2);
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colorsArray, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        // TEXTURA DE PARTÍCULA CON GLOW INTENSO
        const canvasTexture = document.createElement('canvas');
        canvasTexture.width = 64;
        canvasTexture.height = 64;
        const ctxTex = canvasTexture.getContext('2d');
        const grad = ctxTex.createRadialGradient(32, 32, 0, 32, 32, 32);
        grad.addColorStop(0, 'rgba(255, 215, 0, 1)');
        grad.addColorStop(0.3, 'rgba(255, 170, 0, 0.9)');
        grad.addColorStop(0.6, 'rgba(255, 100, 0, 0.5)');
        grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctxTex.fillStyle = grad;
        ctxTex.fillRect(0, 0, 64, 64);
        const particleTexture = new THREE.CanvasTexture(canvasTexture);

        const particleMaterial = new THREE.PointsMaterial({
            size: 0.32,
            map: particleTexture,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0.95
        });

        const particleSystem = new THREE.Points(geometry, particleMaterial);
        scene.add(particleSystem);

        // LUZ AMBIENTE Y EFECTO DE BRILLO ADICIONAL
        const ambientLight = new THREE.AmbientLight(0x222222);
        scene.add(ambientLight);
        const backLight = new THREE.PointLight(0xffaa33, 0.5);
        backLight.position.set(0, 0, 10);
        scene.add(backLight);

        // INTERACCIÓN CON MOUSE
        const mouse = new THREE.Vector2(0, 0);
        const targetMouse = new THREE.Vector2(0, 0);
        
        function onMouseMove(event) {
            const rect = container.getBoundingClientRect();
            const x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            const y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            mouse.x = x;
            mouse.y = y;
        }
        
        container.addEventListener('mousemove', onMouseMove);
        container.addEventListener('mouseleave', () => { mouse.x = 0; mouse.y = 0; });
        container.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = container.getBoundingClientRect();
            const touch = e.touches[0];
            mouse.x = ((touch.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((touch.clientY - rect.top) / rect.height) * 2 + 1;
        }, { passive: false });

        // EXPLOSIÓN / REGRESO
        function toggleExplosion() {
            if (morphingInProgress) return;
            isExploded = !isExploded;
            
            if (isExploded) {
                for (let i = 0; i < particleCount; i++) {
                    const idx = i * 3;
                    const px = originalPositions[idx];
                    const py = originalPositions[idx+1];
                    const pz = originalPositions[idx+2];
                    const dir = new THREE.Vector3(px, py, pz).normalize();
                    const force = 12 + Math.random() * 18;
                    const tx = px + dir.x * force;
                    const ty = py + dir.y * force;
                    const tz = pz + dir.z * force;
                    gsap.to(positions, {
                        [idx]: tx,
                        [idx+1]: ty,
                        [idx+2]: tz,
                        duration: 0.9 + Math.random() * 0.4,
                        ease: "back.out(0.6)",
                        onUpdate: () => geometry.attributes.position.needsUpdate = true
                    });
                }
                hint.textContent = '💥 Click para REAGRUPAR 💥';
                hint.classList.add('visible');
                setTimeout(() => hint.classList.remove('visible'), 2500);
            } else {
                morphToShape(currentShapeIndex, 1.0);
                hint.textContent = '✨ Click para EXPLOTAR ✨';
                hint.classList.add('visible');
                setTimeout(() => hint.classList.remove('visible'), 2500);
            }
        }
        
        container.addEventListener('click', toggleExplosion);
        container.addEventListener('touchstart', toggleExplosion);

        // SCROLL PARA CAMBIAR FORMA
        let scrollDelay = false;
        function onWheel(e) {
            if (isExploded || morphingInProgress) return;
            if (scrollDelay) return;
            scrollDelay = true;
            const delta = e.deltaY > 0 ? 1 : -1;
            currentShapeIndex = (currentShapeIndex + delta + shapes.length) % shapes.length;
            morphToShape(currentShapeIndex, 1.2);
            shapeIndicator.textContent = shapes[currentShapeIndex].name;
            shapeIndicator.style.opacity = '1';
            gsap.to(shapeIndicator, { duration: 0.5, opacity: 0.6, delay: 1.2 });
            setTimeout(() => { scrollDelay = false; }, 400);
        }
        
        container.addEventListener('wheel', onWheel);

        // FUNCIÓN MORFING SUAVE
        function morphToShape(shapeIndex, duration = 1.2) {
            if (morphingInProgress) return;
            morphingInProgress = true;
            const shape = shapes[shapeIndex];
            const newPositions = new Float32Array(particleCount * 3);
            const tempOrig = new Float32Array(particleCount * 3);
            shape.generator(particleCount, newPositions, tempOrig);
            
            const updateProps = {};
            for (let i = 0; i < particleCount; i++) {
                const idx = i * 3;
                updateProps[idx] = newPositions[idx];
                updateProps[idx+1] = newPositions[idx+1];
                updateProps[idx+2] = newPositions[idx+2];
            }
            
            gsap.to(positions, {
                ...updateProps,
                duration: duration,
                ease: "elastic.out(0.8, 0.5)",
                onUpdate: () => geometry.attributes.position.needsUpdate = true,
                onComplete: () => {
                    for (let i = 0; i < particleCount; i++) {
                        const idx = i * 3;
                        originalPositions[idx] = newPositions[idx];
                        originalPositions[idx+1] = newPositions[idx+1];
                        originalPositions[idx+2] = newPositions[idx+2];
                    }
                    morphingInProgress = false;
                }
            });
        }

        // MOSTRAR HINT INICIAL
        setTimeout(() => {
            hint.classList.add('visible');
            setTimeout(() => hint.classList.remove('visible'), 5000);
        }, 800);

        // ANIMACIÓN LOOP CON INTERACCIÓN DE MOUSE (ATRACCIÓN + ONDAS)
        const clock = new THREE.Clock();
        const tempVec = new THREE.Vector3();
        const mouseWorld = new THREE.Vector3();
        
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            
            targetMouse.lerp(mouse, 0.07);
            
            if (!isExploded && !morphingInProgress) {
                const posAttr = geometry.attributes.position.array;
                mouseWorld.set(targetMouse.x * 9, targetMouse.y * 6, 0);
                
                for (let i = 0; i < particleCount; i++) {
                    const idx = i * 3;
                    const px = posAttr[idx];
                    const py = posAttr[idx+1];
                    const pz = posAttr[idx+2];
                    tempVec.set(px, py, pz);
                    const distToMouse = tempVec.distanceTo(mouseWorld);
                    
                    if (distToMouse < 6.5) {
                        const force = (6.5 - distToMouse) / 6.5 * 0.045;
                        const dir = new THREE.Vector3().subVectors(mouseWorld, tempVec).normalize();
                        posAttr[idx] += dir.x * force;
                        posAttr[idx+1] += dir.y * force;
                        posAttr[idx+2] += dir.z * force;
                    }
                    
                    // Elasticidad de retorno
                    const returnSpeed = 0.045;
                    posAttr[idx] += (originalPositions[idx] - posAttr[idx]) * returnSpeed;
                    posAttr[idx+1] += (originalPositions[idx+1] - posAttr[idx+1]) * returnSpeed;
                    posAttr[idx+2] += (originalPositions[idx+2] - posAttr[idx+2]) * returnSpeed;
                    
                    // Efecto flotante sutil que aumenta la visibilidad
                    posAttr[idx] += Math.sin(time * 2.5 + i * 0.008) * 0.008;
                    posAttr[idx+1] += Math.cos(time * 2.2 + i * 0.007) * 0.008;
                }
                geometry.attributes.position.needsUpdate = true;
            }
            
            // Rotación general suave
            particleSystem.rotation.y = time * 0.08;
            particleSystem.rotation.x = Math.sin(time * 0.18) * 0.08;
            particleSystem.rotation.z = Math.cos(time * 0.12) * 0.04;
            
            renderer.render(scene, camera);
        }
        
        animate();

        // RESIZE
        window.addEventListener('resize', () => {
            const w = container.clientWidth;
            const h = container.clientHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });
        
        // Forzar actualización inicial de posiciones
        geometry.attributes.position.needsUpdate = true;
        
        console.log("Sistema de partículas mejorado activo — Brillo y tamaño aumentados");
    </script>
</body>
</html>
