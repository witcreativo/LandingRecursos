<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malla 3D Tipográfica</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Outfit', sans-serif;
        }

        #canvas-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .banner-overlay {
            position: absolute;
            bottom: 60px;
            left: 60px;
            z-index: 10;
            pointer-events: none;
        }

        .banner-overlay h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 700;
            color: #fff;
            letter-spacing: -3px;
            line-height: 1.1;
            margin-bottom: 16px;
        }

        .banner-overlay h1 span {
            background: linear-gradient(135deg, #e91e63, #9c27b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .banner-overlay p {
            font-size: 1rem;
            color: rgba(255,255,255,0.6);
            max-width: 400px;
            font-weight: 300;
        }

        .banner-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="banner-overlay">
        <div class="banner-badge">🎨 Three.js</div>
        <h1>Diseño en<br><span>3 dimensiones</span></h1>
        <p>Malla tipográfica interactiva que responde al movimiento del ratón con efectos de distorsión.</p>
    </div>

    <script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // Crear malla de puntos
        const geometry = new THREE.PlaneGeometry(20, 20, 40, 40);
        const positions = geometry.attributes.position;
        const originalPositions = [];

        for (let i = 0; i < positions.count; i++) {
            originalPositions.push({
                x: positions.getX(i),
                y: positions.getY(i),
                z: positions.getZ(i)
            });
        }

        const material = new THREE.PointsMaterial({
            color: 0xe91e63,
            size: 0.08,
            transparent: true,
            opacity: 0.8,
            sizeAttenuation: true
        });

        const points = new THREE.Points(geometry, material);
        scene.add(points);

        // Líneas de conexión
        const lineMaterial = new THREE.LineBasicMaterial({
            color: 0x9c27b0,
            transparent: true,
            opacity: 0.15
        });

        camera.position.z = 8;

        // Mouse
        let mouse = { x: 0, y: 0 };
        let targetMouse = { x: 0, y: 0 };

        document.addEventListener('mousemove', (e) => {
            targetMouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            targetMouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        // Animación
        let time = 0;

        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            // Suavizar mouse
            mouse.x += (targetMouse.x - mouse.x) * 0.05;
            mouse.y += (targetMouse.y - mouse.y) * 0.05;

            // Animar puntos
            for (let i = 0; i < positions.count; i++) {
                const orig = originalPositions[i];
                const distX = orig.x - mouse.x * 5;
                const distY = orig.y - mouse.y * 5;
                const dist = Math.sqrt(distX * distX + distY * distY);
                
                const wave = Math.sin(orig.x * 0.5 + time) * Math.cos(orig.y * 0.5 + time) * 0.5;
                const mouseEffect = Math.max(0, 1 - dist / 5) * 2;

                positions.setZ(i, orig.z + wave + mouseEffect);
            }

            positions.needsUpdate = true;

            // Rotación suave
            points.rotation.x = mouse.y * 0.3;
            points.rotation.y = mouse.x * 0.3;

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
