<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente Animado</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            font-family: 'Outfit', sans-serif;
            padding: 40px;
        }

        .gradient-container {
            text-align: center;
            max-width: 900px;
        }

        .gradient-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 40px;
        }

        .gradient-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(3rem, 8vw, 7rem);
            font-weight: 800;
            letter-spacing: -4px;
            line-height: 1;
            background: linear-gradient(
                90deg,
                #e91e63,
                #9c27b0,
                #673ab7,
                #2196f3,
                #00bcd4,
                #4caf50,
                #ffeb3b,
                #ff9800,
                #e91e63
            );
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 4s ease infinite;
            filter: drop-shadow(0 0 30px rgba(233,30,99,0.3));
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .gradient-sub {
            margin-top: 32px;
            font-size: 1.2rem;
            color: rgba(255,255,255,0.5);
            font-weight: 300;
        }

        /* Segunda línea con efecto diferente */
        .gradient-text-2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            font-weight: 600;
            margin-top: 16px;
            letter-spacing: -1px;
            background: linear-gradient(
                45deg,
                #fff 0%,
                #e91e63 25%,
                #9c27b0 50%,
                #2196f3 75%,
                #fff 100%
            );
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift-2 6s ease infinite;
        }

        @keyframes gradient-shift-2 {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Efecto de brillo adicional */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(233,30,99,0.15), transparent 70%);
            filter: blur(60px);
            pointer-events: none;
            animation: float 8s ease-in-out infinite;
        }

        .glow-1 {
            top: 20%;
            left: 20%;
            animation-delay: 0s;
        }

        .glow-2 {
            bottom: 20%;
            right: 20%;
            background: radial-gradient(circle, rgba(33,150,243,0.15), transparent 70%);
            animation-delay: -4s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        .wrapper {
            position: relative;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>

        <div class="gradient-container">
            <div class="gradient-label">🌈 Gradiente Animado</div>
            <div class="gradient-text">Creatividad<br>sin límites</div>
            <div class="gradient-text-2">Colores que fluyen y cobran vida</div>
            <div class="gradient-sub">Fondo de gradiente que se desplaza continuamente</div>
        </div>
    </div>
</body>
</html>
