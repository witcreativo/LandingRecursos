<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reveal por Letras</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #faf9f7, #f0f0f0);
            font-family: 'Outfit', sans-serif;
            padding: 40px;
        }

        .reveal-container {
            text-align: center;
            max-width: 900px;
        }

        .reveal-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: var(--blanco);
            border: 1px solid var(--borde-suave);
            border-radius: 50px;
            font-size: 0.85rem;
            color: var(--texto-secundario);
            margin-bottom: 40px;
            box-shadow: var(--sombra-suave);
        }

        .reveal-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 700;
            color: var(--texto-principal);
            letter-spacing: -3px;
            line-height: 1.1;
        }

        .reveal-char {
            display: inline-block;
            opacity: 0;
            transform: translateY(40px) rotate(10deg);
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .reveal-char.visible {
            opacity: 1;
            transform: translateY(0) rotate(0deg);
        }

        /* Colores alternos para cada palabra */
        .reveal-char.color-1 { color: #e91e63; }
        .reveal-char.color-2 { color: #9c27b0; }
        .reveal-char.color-3 { color: #673ab7; }
        .reveal-char.color-4 { color: #3f51b5; }

        .reveal-sub {
            margin-top: 32px;
            font-size: 1.2rem;
            color: var(--texto-secundario);
            font-weight: 300;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease 1.5s;
        }

        .reveal-sub.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Botón para reiniciar */
        .retrigger-btn {
            margin-top: 40px;
            padding: 12px 28px;
            background: linear-gradient(135deg, #e91e63, #9c27b0);
            border: none;
            border-radius: 50px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease 2s;
        }

        .retrigger-btn.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .retrigger-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(233,30,99,0.3);
        }
    </style>
</head>
<body>
    <div class="reveal-container">
        <div class="reveal-label">🎭 Efecto Reveal</div>
        <div class="reveal-text" id="revealText"></div>
        <div class="reveal-sub" id="revealSub">Cada letra aparece con su propia animación escalonada</div>
        <button class="retrigger-btn" id="retriggerBtn" onclick="restartAnimation()">
            Reproducir de nuevo
        </button>
    </div>

    <script>
        const text = "Diseño que impacta";
        const container = document.getElementById('revealText');
        const sub = document.getElementById('revealSub');
        const btn = document.getElementById('retriggerBtn');

        function createSpans() {
            container.innerHTML = '';
            let colorIndex = 0;
            let wordCount = 0;

            text.split('').forEach((char, i) => {
                const span = document.createElement('span');
                span.className = 'reveal-char';
                span.textContent = char === ' ' ? '\u00A0' : char;

                // Cambiar color cada palabra
                if (char === ' ') {
                    wordCount++;
                    colorIndex = wordCount % 4;
                }
                span.classList.add(`color-${colorIndex + 1}`);

                span.style.transitionDelay = `${i * 0.05}s`;
                container.appendChild(span);
            });
        }

        function animate() {
            createSpans();
            const chars = document.querySelectorAll('.reveal-char');

            // Reset
            chars.forEach(c => c.classList.remove('visible'));
            sub.classList.remove('visible');
            btn.classList.remove('visible');

            // Activar con delay
            setTimeout(() => {
                chars.forEach(c => c.classList.add('visible'));
                sub.classList.add('visible');
                btn.classList.add('visible');
            }, 300);
        }

        function restartAnimation() {
            animate();
        }

        // Iniciar al cargar
        window.addEventListener('load', animate);
    </script>
</body>
</html>
