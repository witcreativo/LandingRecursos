<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botón Líquido</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #faf9f7, #f5f5f5);
            font-family: 'Outfit', sans-serif;
        }

        .btn-liquido {
            position: relative;
            padding: 20px 48px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #e91e63, #9c27b0);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            letter-spacing: 0.5px;
        }

        .btn-liquido::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: rgba(255,255,255,0.25);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.7s ease, height 0.7s ease;
        }

        .btn-liquido:hover::before {
            width: 400px;
            height: 400px;
        }

        .btn-liquido:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(233,30,99,0.35);
        }

        .btn-liquido:active {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(233,30,99,0.25);
        }

        .btn-liquido span {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <button class="btn-liquido"><span>Hover me</span></button>
</body>
</html>
